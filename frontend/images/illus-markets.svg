<svg width="640" height="400" viewBox="0 0 640 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Markets illustration">
  <defs>
    <linearGradient id="im-area" x1="0" y1="120" x2="0" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="im-line" x1="40" y1="300" x2="600" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- soft backdrop panel -->
  <rect x="24" y="24" width="592" height="352" rx="24" fill="#0F0A1E"/>
  <rect x="24" y="24" width="592" height="352" rx="24" fill="#8B5CF6" opacity="0.04"/>

  <!-- grid -->
  <g stroke="#2A2147" stroke-width="1">
    <line x1="56" y1="96"  x2="584" y2="96"/>
    <line x1="56" y1="168" x2="584" y2="168"/>
    <line x1="56" y1="240" x2="584" y2="240"/>
    <line x1="56" y1="312" x2="584" y2="312"/>
  </g>

  <!-- filled area under the trend line -->
  <path d="M56 300 L150 250 L240 280 L330 200 L420 230 L510 150 L584 110 L584 312 L56 312 Z"
        fill="url(#im-area)"/>

  <!-- rising trend line -->
  <path d="M56 300 L150 250 L240 280 L330 200 L420 230 L510 150 L584 110"
        stroke="url(#im-line)" stroke-width="4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- candlesticks marching upward -->
  <g stroke-linecap="round">
    <g stroke="#A78BFA" stroke-width="2.5">
      <line x1="150" y1="232" x2="150" y2="288"/>
      <line x1="240" y1="258" x2="240" y2="312"/>
      <line x1="330" y1="178" x2="330" y2="244"/>
      <line x1="420" y1="206" x2="420" y2="268"/>
      <line x1="510" y1="128" x2="510" y2="196"/>
    </g>
    <g fill="#8B5CF6">
      <rect x="142" y="244" width="16" height="34" rx="3"/>
      <rect x="232" y="270" width="16" height="30" rx="3"/>
      <rect x="322" y="190" width="16" height="42" rx="3"/>
      <rect x="412" y="218" width="16" height="38" rx="3"/>
      <rect x="502" y="140" width="16" height="46" rx="3"/>
    </g>
  </g>

  <!-- highlighted node at the peak -->
  <circle cx="584" cy="110" r="7" fill="#A78BFA"/>
  <circle cx="584" cy="110" r="13" fill="#A78BFA" opacity="0.2"/>
</svg>
