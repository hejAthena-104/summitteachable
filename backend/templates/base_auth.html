{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light" data-sidebar-behaviour="fixed" data-navigation-color="default" data-is-fluid="true">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="Summit Teachable" name="author">

    <!-- Theme CSS -->
    <link rel="stylesheet" href="{% static 'themes/dashly/assets/css/theme.bundle.css' %}" id="stylesheetLTR">
    <link rel="stylesheet" href="{% static 'themes/dashly/assets/css/theme.rtl.bundle.css' %}" id="stylesheetRTL">
    <link rel="stylesheet" href="{% static 'css/summit-theme.css' %}?v=9">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap">
    <link rel="stylesheet" media="print" onload="this.onload=null;this.removeAttribute('media');"
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- no-JS fallback -->
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap">
    </noscript>

    <script>
        // Theme switcher - Dark theme is default
        let themeSwitcher = document.getElementById('themeSwitcher');

        const getPreferredTheme = () => {
            if (localStorage.getItem('theme') != null) {
                return localStorage.getItem('theme');
            }
            return 'light'; // Default to light theme
        };

        const setTheme = function(theme) {
            if (theme === 'auto') {
                document.documentElement.dataset.theme = 'light'; // Default auto to light
            } else {
                document.documentElement.dataset.theme = theme;
            }
            localStorage.setItem('theme', theme);
        };

        const showActiveTheme = theme => {
            const activeBtn = document.querySelector(`[data-theme-value="${theme}"]`);
            document.querySelectorAll('[data-theme-value]').forEach(element => {
                element.classList.remove('active');
            });
            activeBtn && activeBtn.classList.add('active');
            document.querySelectorAll('[data-theme-control="theme"]').forEach(element => {
                if (element.value == theme) {
                    element.checked = true;
                }
            });
        };

        function reloadPage() {
            window.location = window.location.pathname;
        }

        setTheme(getPreferredTheme());

        if (typeof themeSwitcher != 'undefined') {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (localStorage.getItem('theme') != null) {
                    if (localStorage.getItem('theme') == 'auto') {
                        reloadPage();
                    }
                }
            });

            window.addEventListener('load', () => {
                showActiveTheme(getPreferredTheme());
                document.querySelectorAll('[data-theme-value]').forEach(element => {
                    element.addEventListener('click', () => {
                        const theme = element.getAttribute('data-theme-value');
                        localStorage.setItem('theme', theme);
                        reloadPage();
                    })
                })
            });
        }
    </script>

    <!-- Favicon -->
    <link rel="icon" href="{% static 'images/favicon.png' %}?v=3" type="image/png">
    <link rel="shortcut icon" href="{% static 'images/favicon.png' %}?v=3" type="image/png">

    <!-- Page Title -->
    <title>{% block title %}Auth | Summit Teachable{% endblock %}</title>

    {% block extra_head %}{% endblock %}
</head>

<body>
    <!-- THEME CONFIGURATION -->
    <script>
        let themeAttrs = document.documentElement.dataset;
        for (let attr in themeAttrs) {
            if (localStorage.getItem(attr) != null) {
                document.documentElement.dataset[attr] = localStorage.getItem(attr);
                if (theme === 'auto') {
                    document.documentElement.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ?
                        'dark' : 'light';
                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                        e.matches ? document.documentElement.dataset.theme = 'dark' : document.documentElement
                            .dataset.theme = 'light';
                    });
                }
            }
        }
    </script>

    <!-- Theme Toggle Button -->
    <button type="button" class="btn btn-light position-fixed shadow-sm" id="themeToggleBtn"
        style="top: 20px; right: 20px; z-index: 1050; width: 44px; height: 44px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center;">
        <i class="bi bi-sun-fill" id="themeIcon" style="font-size: 1.2rem;"></i>
    </button>

    <script>
        // Theme toggle functionality - Light theme is default
        function updateThemeIcon() {
            const theme = document.documentElement.dataset.theme || 'light';
            const icon = document.getElementById('themeIcon');
            const btn = document.getElementById('themeToggleBtn');
            if (theme === 'dark') {
                icon.className = 'bi bi-moon-fill';
                btn.classList.remove('btn-light');
                btn.classList.add('btn-dark');
            } else {
                icon.className = 'bi bi-sun-fill';
                btn.classList.remove('btn-dark');
                btn.classList.add('btn-light');
            }
        }

        document.getElementById('themeToggleBtn').addEventListener('click', function() {
            const currentTheme = document.documentElement.dataset.theme || 'light';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.dataset.theme = newTheme;
            localStorage.setItem('theme', newTheme);
            updateThemeIcon();
        });

        // Initialize icon on page load
        document.addEventListener('DOMContentLoaded', updateThemeIcon);
        updateThemeIcon();
    </script>

    <!-- MAIN CONTENT -->
    <main class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main> <!-- / main -->

    <!-- JAVASCRIPT-->
    <!-- Theme JS -->
    <script src="{% static 'themes/dashly/assets/js/theme.bundle.js' %}"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"
        integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>

    {% block extra_js %}{% endblock %}
</body>

</html>
