{% load static %}
{# Minimal dashboard top strip: balance chip + user name/avatar. #}
<header class="st-topbar container-fluid d-flex align-items-center">
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="st-balance-chip">Balance:&nbsp;<strong>${{ user.balance|floatformat:2 }}</strong></span>
    <div class="dropdown">
      <a class="d-flex align-items-center text-decoration-none text-reset" href="#" data-bs-toggle="dropdown" aria-expanded="false">
        <span class="st-avatar">{{ user.first_name|default:user.username|first|upper }}</span>
        <span class="ms-2 fw-semibold d-none d-sm-inline">{{ user.get_full_name|default:user.username }}</span>
        <i class="bi bi-chevron-down ms-1 small text-muted"></i>
      </a>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="{% url 'dashboard:index' %}"><i class="bi bi-grid-1x2 me-2"></i>Dashboard</a></li>
        <li><a class="dropdown-item" href="{% url 'dashboard:account_settings' %}"><i class="bi bi-person me-2"></i>Profile</a></li>
        <li><a class="dropdown-item" href="{% url 'dashboard:kyc' %}"><i class="bi bi-patch-check me-2"></i>Verification</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger" href="{% url 'accounts:logout' %}"><i class="bi bi-box-arrow-right me-2"></i>Sign out</a></li>
      </ul>
    </div>
  </div>
</header>
