<!DOCTYPE html>
<html lang="en" data-theme="light" data-sidebar-behaviour="fixed" data-navigation-color="default" data-is-fluid="true">
<head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'themes/dashly/assets/css/theme.bundle.css' %}">
    <link rel="stylesheet" href="{% static 'css/summit-theme.css' %}?v=9">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="icon" href="{% static 'images/favicon.png' %}?v=3" type="image/png">
    <title>Top-up | Summit Teachable</title>
</head>
<body>
    {% include 'includes/messages.html' %}
    {% include "includes/sidebar.html" %}
    <main>
        <div class="container-fluid py-6">
            <div class="card mt-4">
                <div class="card-body text-center py-6">
                    <i class="bi bi-lightning-charge-fill fs-1 trade-win d-block mb-3"></i>
                    <h2 class="h3">Top-up complete</h2>
                    <p class="text-muted">Your balance was updated after you selected an amount.</p>
                    <a href="{% url 'dashboard:deposits' %}" class="btn btn-primary mt-2"><i class="bi bi-arrow-left me-1"></i>Back to top up</a>
                </div>
            </div>
        </div>
    </main>
    <script src="{% static 'themes/dashly/assets/js/theme.bundle.js' %}"></script>
</body>
</html>
