<!DOCTYPE html>
<html lang="en" data-theme="light" data-sidebar-behaviour="fixed" data-navigation-color="default" data-is-fluid="true">

<meta http-equiv="content-type" content="text/html;charset=UTF-8" />

<head>
    {% load static %}

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta content="Webinning" name="author">
    <!-- Theme CSS -->
    <link rel="stylesheet" href="{% static 'themes/dashly/assets/css/theme.bundle.css' %}" id="stylesheetLTR">
    <link rel="stylesheet" href="{% static 'themes/dashly/assets/css/theme.rtl.bundle.css' %}" id="stylesheetRTL">
    <link rel="stylesheet" href="{% static 'css/summit-theme.css' %}?v=15">
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&amp;display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <script>
        // Theme switcher (mirrors the dashboard shell)
        const getPreferredTheme = () => {
            if (localStorage.getItem('theme') != null) {
                return localStorage.getItem('theme');
            }
            return document.documentElement.dataset.theme;
        };
        const setTheme = function (theme) {
            if (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.dataset.theme = 'dark';
            } else {
                document.documentElement.dataset.theme = theme;
            }
            localStorage.setItem('theme', theme);
        };
        setTheme(getPreferredTheme());
    </script>

    <link rel="icon" href="{% static 'images/favicon.png' %}?v=3" type="image/png">

    <title>{% block title %}Market Analysis{% endblock %} | Summit Teachable</title>

    <style>
        .analysis-bias-card {
            border-left: 4px solid var(--bias-color, #F59E0B);
        }
        .analysis-bias-pill {
            background: var(--bias-color, #F59E0B);
            color: #fff;
        }
        .analysis-edu-note {
            font-size: .8rem;
        }
    </style>
</head>

<body>
    <!-- Django Messages -->
    {% include 'includes/messages.html' %}

    <!-- THEME CONFIGURATION -->
    <script>
        let themeAttrs = document.documentElement.dataset;
        for (let attr in themeAttrs) {
            if (localStorage.getItem(attr) != null) {
                document.documentElement.dataset[attr] = localStorage.getItem(attr);
            }
        }
    </script>

    <!-- NAVIGATION -->
    {% include "includes/sidebar.html" %}

    <!-- MAIN CONTENT -->
    <main>
        <!-- HEADER -->
        {% include 'includes/topbar.html' %}

        <!-- Footer -->
        <footer class="mt-auto">
            <div class="container-fluid mt-4 mb-6 text-muted">
                <div class="row justify-content-between">
                    <div class="col">All Rights Reserved &copy; Summit Teachable {{ "now"|date:"Y" }}</div>
                </div>
            </div>
        </footer>
    </main>

    <!-- JAVASCRIPT -->
    <script src="{% static 'themes/dashly/assets/js/theme.bundle.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
